<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey FX: Stable Lobby</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; transition: 0.2s; }
        input { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; text-align: center; width: 150px; }
        
        #lobby { width: 320px; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .room-item { background: #1a1a1a; margin: 6px 0; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .room-code { color: #34c759; font-weight: 900; }
        .btn-fast { padding: 6px 12px; background: #5856d6; border-radius: 8px; border: none; color: #fff; cursor: pointer; font-size: 12px; }

        #gameUI { display: none; }
        .id-large { font-size: 48px; color: #34c759; font-weight: 900; margin: 10px 0; }
        .id-small { font-size: 14px; opacity: 0.5; }
        
        #gameArea { position: relative; width: 400px; height: 600px; margin: 0 auto; display: none; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; max-height: 70vh; max-width: 95vw; display: block; margin: 0 auto; }
        .score-board { font-size: 38px; font-weight: bold; margin: 5px 0; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>AIR HOCKEY FX</h1>
        <div id="status">Подключение...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ ИГРУ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
            
            <div id="lobby">
                <div style="font-size: 10px; opacity: 0.5;">АКТИВНЫЕ ИГРОКИ:</div>
                <div id="roomList">Поиск...</div>
            </div>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        
        <div id="hostPreMenu" style="display:none; margin-bottom: 10px;">
            <button class="btn" style="background:#444; font-size:12px;" onclick="location.reload()">⬅ НАЗАД</button>
            <button id="visibilityBtn" class="btn" style="background:#ff9500; font-size:12px;" onclick="toggleVisibility()">👁 ВИДИМОСТЬ: ВЫКЛ</button>
            <button class="btn" style="background:#34c759; font-size:12px;" onclick="sendStartSignal()">СТАРТ</button>
        </div>

        <div id="uiHeader">
            <div id="displayId" class="id-large">...</div>
            <select id="skinSelect" onchange="changeSkin(this.value)" style="background:#222; color:#fff; padding:5px; border-radius:5px;">
                <option value="0">Classic</option>
                <option value="1">Neon Night</option>
                <option value="2">Retro</option>
            </select>
        </div>

        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div id="reconnectOverlay" class="overlay">
                <h2>СВЯЗЬ ПОТЕРЯНА</h2>
                <button class="btn" onclick="location.reload()">В МЕНЮ</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
