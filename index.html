<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P2P Air Hockey</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { background: #333; border: 5px solid #fff; display: none; margin: 0 auto; }
        #menu { margin-top: 50px; }
        .btn { padding: 10px 20px; font-size: 18px; cursor: pointer; margin: 10px; }
        #status { color: #ffcc00; margin: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Аэрохоккей Мультиплеер</h1>
        <button class="btn" onclick="createRoom()">Создать комнату</button>
        <br>
        <input type="text" id="joinId" placeholder="Введите ID комнаты">
        <button class="btn" onclick="joinRoom()">Присоединиться</button>
        <p id="status"></p>
    </div>

    <div id="gameUI" style="display:none;">
        <p>Ваш ID: <span id="displayId"></span></p>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
