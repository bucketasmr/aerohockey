<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Air Hockey Global Pro FX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); }
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; height: 100vh; }
        #menu { padding-top: calc(50px + var(--safe-top)); height: 100%; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .btn { padding: 15px 40px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; -webkit-appearance: none; }
        #resumeBtn { background: #34c759; display: none; position: absolute; z-index: 2000; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #fff; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; }
        #topControls { position: absolute; top: calc(10px + var(--safe-top)); right: 10px; z-index: 1000; }
        #gameUI { display: none; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        #displayId { font-weight: 900; color: #34c759; font-size: 14px; opacity: 0.6; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; max-height: 65vh; max-width: 95vw; display: block; margin: 0 auto; }
        .score-board { font-size: 42px; font-weight: bold; margin: 5px 0; font-family: monospace; }
        .host-only { display: none; }
    </style>
</head>
<body>
    <div id="topControls">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
        </select>
    </div>

    <button id="resumeBtn" class="btn" onclick="resumeGame()">ПРОДОЛЖИТЬ / RESUME</button>

    <div id="menu">
        <h1 style="letter-spacing: 2px;">AIR HOCKEY FX</h1>
        <div id="status" data-i18n="loading">Инициализация...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()" data-i18n="create">СОЗДАТЬ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()" data-i18n="join">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        <div class="host-only" style="margin-bottom:10px;">
            <select id="skinSelect" onchange="changeSkin(this.value)">
                <option value="0">Classic</option><option value="1">Neon Night</option><option value="2">Retro Wave</option>
                <option value="3">Stadium</option><option value="4">Forest</option><option value="5">Anubis</option>
                <option value="6">Lava</option><option value="7">Space</option><option value="8">Cyber City</option>
            </select>
        </div>
        <div id="uiHeader">
            <div id="displayId">...</div>
            <div id="hostControls" class="host-only">
                <button class="btn" onclick="sendStartSignal()" data-i18n="start" style="padding: 8px 25px;">СТАРТ</button>
            </div>
        </div>
        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
