<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Air Hockey Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.3); outline: none; }
        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn-reset { padding: 8px 20px; font-size: 14px; background: #555; box-shadow: none; margin: 5px; position: absolute; top: 10px; right: 10px; z-index: 10; }
        input { padding: 15px; font-size: 20px; width: 220px; text-align: center; text-transform: uppercase; border-radius: 15px; border: 2px solid #333; background: #222; color: #fff; margin-bottom: 10px; outline: none; }
        #gameArea { position: relative; display: none; margin: 5px auto; width: 400px; height: 600px; }
        canvas { background: #222; border: 4px solid #444; border-radius: 10px; display: block; max-height: 85vh; max-width: 95vw; }
        #status { color: #ffcc00; padding: 15px; font-size: 18px; min-height: 24px; }
        #displayId { font-size: 28px; color: #34c759; letter-spacing: 2px; font-weight: bold; }
        .score-board { font-size: 24px; font-weight: bold; color: rgba(255,255,255,0.7); margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Air Hockey P2P</h1>
        <div id="status">Загрузка...</div>
        <button class="btn" onclick="createRoom()" id="btnCreate" style="display:none;">СОЗДАТЬ ИГРУ</button>
        <br>
        <div id="joinArea" style="display:none;">
            <input type="text" id="joinId" placeholder="КОД КОМНАТЫ" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div id="idInfo">КОД: <b id="displayId">...</b></div>
        <div class="score-board" id="scoreDisplay">ВЫ 0 : 0 ВРАГ</div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn" onclick="sendStartSignal()" id="btnStartGame">НАЧАТЬ МАТЧ</button>
            <button class="btn btn-reset" onclick="manualBallReset()" id="btnResetBall" style="display:none;">🆘 СБРОС МЯЧА</button>
        </div>
        
        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
