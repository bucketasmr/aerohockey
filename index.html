<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Air Hockey Skins</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { padding-top: 30px; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .btn { padding: 12px 30px; font-size: 18px; cursor: pointer; margin: 5px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-skin { background: #444; font-size: 14px; padding: 10px 20px; }
        .skin-active { background: #34c759; box-shadow: 0 0 10px #34c759; }
        input { padding: 12px; font-size: 18px; width: 200px; text-align: center; text-transform: uppercase; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; margin: 10px 0; }
        #gameArea { position: relative; display: none; margin: 0 auto; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #333; border-radius: 10px; display: block; max-height: 80vh; max-width: 95vw; margin: 0 auto; }
        #status { color: #ffcc00; padding: 10px; font-size: 16px; }
        #displayId { font-size: 24px; color: #34c759; font-weight: bold; }
        .score-board { font-size: 22px; font-weight: bold; color: rgba(255,255,255,0.8); margin: 5px 0; }
        .skins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-reset { position: absolute; top: 5px; right: 5px; padding: 5px 10px; font-size: 12px; background: rgba(255,255,255,0.1); z-index: 20; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Air Hockey</h1>
        <div id="status">Загрузка сети...</div>
        
        <div id="mainButtons" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ</button>
            <input type="text" id="joinId" placeholder="КОД">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
            
            <p>Выберите дизайн:</p>
            <div class="skins-grid" id="skinsGrid">
                <button class="btn btn-skin skin-active" onclick="setSkin(0, this)">1. Стандарт</button>
                <button class="btn btn-skin" onclick="setSkin(1, this)">2. Неон</button>
                <button class="btn btn-skin" onclick="setSkin(2, this)">3. Ретро</button>
                <button class="btn btn-skin" onclick="setSkin(3, this)">4. Лед</button>
                <button class="btn btn-skin" onclick="setSkin(4, this)">5. Лес</button>
                <button class="btn btn-skin" onclick="setSkin(5, this)">6. Пустыня</button>
                <button class="btn btn-skin" onclick="setSkin(6, this)">7. Лава</button>
                <button class="btn btn-skin" onclick="setSkin(7, this)">8. Космос</button>
                <button class="btn btn-skin" onclick="setSkin(8, this)">9. Киберпанк</button>
            </div>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="score-board" id="scoreDisplay">ВЫ 0 : 0 ВРАГ</div>
        <div id="idInfo" style="font-size: 14px; margin-bottom: 5px;">КОД: <b id="displayId">...</b></div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn" onclick="sendStartSignal()">СТАРТ</button>
        </div>
        
        <div id="gameArea">
            <button class="btn btn-reset" onclick="manualBallReset()" id="btnReset">🆘 СБРОС</button>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
