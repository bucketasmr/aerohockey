<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey FX Ultimate</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; width: 280px; transition: 0.3s; }
        #quickJoinBtn { background: #ff3b30; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; text-align: center; }
        
        /* Переключатель языка */
        #langSwitcher { position: absolute; top: 10px; right: 10px; z-index: 1000; }
        #langSelect { padding: 5px; font-size: 12px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid #444; cursor: pointer; }

        #displayId { font-weight: 900; color: #34c759; display: block; transition: all 0.5s ease; }
        .id-large { font-size: 48px; text-shadow: 0 0 20px rgba(52, 199, 89, 0.6); margin: 10px 0; letter-spacing: 5px; }
        
        #lobbyContainer { width: 300px; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #roomList { max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .room-item { background: #1a1a1a; margin: 6px 0; padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .room-code { color: #34c759; font-weight: bold; }

        #gameUI { display: none; flex-direction: column; align-items: center; position: relative; height: 100vh; }
        #gameArea { position: relative; width: 400px; height: 600px; margin: 0 auto; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; }
        .score-board { font-size: 38px; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 10px; }
        #roomCodeDisplay { color: #34c759; font-size: 32px; font-weight: 900; margin: 10px; letter-spacing: 3px; }
        .btn-mini { padding: 5px 15px; font-size: 12px; width: auto; background: #5856d6; }
    </style>
</head>
<body>
    <div id="langSwitcher">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="menu">
        <h1>AIR HOCKEY FX</h1>
        <div id="status" data-i18n="loading">Загрузка системы...</div>
        <div id="setupActions" style="display:none;">
            <button id="quickJoinBtn" class="btn" onclick="quickJoin()" data-i18n="noRooms">НЕТ СВОБОДНЫХ ИГР</button>
            <button id="createBtn" class="btn" style="background: #444;" onclick="createRoom()" data-i18n="create">СОЗДАТЬ</button>
            <br>
            <div style="margin-top:10px;">
                <input type="text" id="joinId" placeholder="КОД" maxlength="5" data-i18n-placeholder="code">
                <button id="joinBtn" class="btn" style="background: #5856d6; width: auto; padding: 12px 25px;" onclick="joinRoom()" data-i18n="join">ВОЙТИ</button>
            </div>
            <div id="lobbyContainer">
                <div style="font-size: 10px; opacity: 0.5;" data-i18n="activeRooms">АКТИВНЫЕ КОМНАТЫ:</div>
                <div id="roomList" data-i18n="searching">Поиск...</div>
            </div>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        <div id="hostControls" style="display:none; margin-bottom: 10px;">
            <button id="startBtn" class="btn" style="width:auto; padding: 10px 30px; background:#34c759;" onclick="startGame()" data-i18n="start">СТАРТ</button>
            <button id="menuBtn" class="btn" style="width:auto; padding: 10px 30px; background:#ff3b30;" onclick="location.reload()" data-i18n="toMenu">В МЕНЮ</button>
        </div>
        <div id="gameArea">
            <div id="msgOverlay" class="overlay">
                <h2 id="overlayText" data-i18n="waitingPlayer">ОЖИДАНИЕ ИГРОКА</h2>
                <div id="roomCodeDisplay"></div>
            </div>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
