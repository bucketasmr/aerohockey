<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Air Hockey Global ULTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); }
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; height: 100vh; }
        #menu { padding-top: calc(60px + var(--safe-top)); height: 100%; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .btn { padding: 16px 40px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; -webkit-appearance: none; }
        #resumeBtn { background: #34c759; display: none; position: absolute; z-index: 2000; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 4px solid #fff; scale: 1.2; }
        input { padding: 14px; font-size: 18px; border-radius: 12px; border: 2px solid #444; background: #222; color: #fff; text-align: center; width: 180px; margin: 10px; }
        #status { font-size: 14px; color: #007aff; margin: 15px; font-weight: bold; }
        #gameUI { display: none; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        canvas { background: #000; border: 3px solid #333; border-radius: 15px; max-height: 60vh; max-width: 95vw; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score { font-size: 48px; font-weight: 900; margin: 10px 0; font-family: 'Courier New', monospace; color: #34c759; }
        .host-controls { display: none; margin: 10px 0; }
        #roomCodeDisplay { font-size: 12px; opacity: 0.5; margin-bottom: 5px; }
    </style>
</head>
<body>
    <button id="resumeBtn" class="btn" onclick="resumeGame()">ПРОДОЛЖИТЬ</button>

    <div id="menu">
        <h1 style="margin-bottom: 5px;">AIR HOCKEY FX</h1>
        <div id="status">ЗАГРУЗКА...</div>
        <div id="setup" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ</button>
            <div style="margin: 20px 0; opacity: 0.3;">ИЛИ</div>
            <input type="text" id="joinId" placeholder="КОД" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI">
        <div class="score" id="scoreDisplay">0 : 0</div>
        <div id="roomCodeDisplay">...</div>
        <div class="host-controls" id="hostUI">
            <select id="skinSelect" onchange="changeSkin(this.value)" style="padding: 5px; border-radius: 5px;">
                <option value="0">Classic</option><option value="1">Neon</option><option value="2">Retro</option>
                <option value="3">Stadium</option><option value="6">Lava</option><option value="8">Cyber</option>
            </select>
            <button class="btn" onclick="startGame()" style="padding: 10px 25px; font-size: 14px;">СТАРТ</button>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
