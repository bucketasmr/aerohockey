<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .btn { padding: 12px 35px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; }
        #gameArea { position: relative; display: none; margin: 0 auto; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #333; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; }
        #status { color: #ffcc00; padding: 10px; font-size: 16px; }
        .score-board { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .btn-reset { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.15); border-radius: 6px; z-index: 10; color: #fff; border: none; }
        #skinSelectorContainer { margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Air Hockey</h1>
        <div id="status">Инициализация...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ ИГРУ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД КОМНАТЫ">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="score-board" id="scoreDisplay">ВЫ 0 : 0 ВРАГ</div>
        
        <div id="skinSelectorContainer">
            <label for="skinSelect">Дизайн: </label>
            <select id="skinSelect" onchange="changeSkin(this.value)">
                <option value="0">1. Стандарт</option>
                <option value="1">2. Неон</option>
                <option value="2">3. Ретро</option>
                <option value="3">4. Лед</option>
                <option value="4">5. Лес</option>
                <option value="5">6. Пустыня</option>
                <option value="6">7. Лава</option>
                <option value="7">8. Космос</option>
                <option value="8">9. Киберпанк</option>
            </select>
        </div>

        <div id="idInfo" style="margin-bottom: 5px; color: #34c759; font-weight: bold;">ID: <span id="displayId">...</span></div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn" onclick="sendStartSignal()">НАЧАТЬ МАТЧ</button>
        </div>
        
        <div id="gameArea">
            <button class="btn-reset" onclick="manualBallReset()">🆘 СБРОС</button>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
