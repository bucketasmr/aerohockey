<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey FX: One-Click Play</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); }
        
        .btn { padding: 18px 40px; font-size: 16px; cursor: pointer; margin: 8px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.3); text-transform: uppercase; transition: 0.3s; width: 280px; }
        .btn:active { transform: scale(0.96); }
        
        #quickJoinBtn { background: #ff3b30; transition: background 0.5s ease; } /* Изначально красный */
        
        input { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; text-align: center; width: 120px; }
        
        #lobbyContainer { width: 300px; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .room-item { background: #111; margin: 5px 0; padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .room-code { color: #34c759; font-weight: bold; letter-spacing: 1px; }

        #gameUI { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 20px; }
        .score-board { font-size: 42px; font-weight: 900; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        #hostControls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-mini { padding: 10px 20px; font-size: 12px; width: auto; }

        #gameArea { position: relative; width: 400px; height: 600px; }
        canvas { background: #000; border: 3px solid #333; border-radius: 15px; max-height: 70vh; max-width: 95vw; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 4px; margin-bottom: 30px;">AIR HOCKEY FX</h1>
        
        <div id="status">Подключение к сети...</div>
        
        <div id="setupActions" style="display:none;">
            <button id="quickJoinBtn" class="btn" onclick="quickJoin()">НЕТ СВОБОДНЫХ ИГР</button>
            <button class="btn" style="background: #222; border: 1px solid #444;" onclick="createRoom()">СОЗДАТЬ ИГРУ</button>
            
            <div style="margin-top: 15px;">
                <input type="text" id="manualId" placeholder="КОД" maxlength="5">
                <button class="btn" style="width: auto; padding: 12px 25px; background: #5856d6;" onclick="joinByCode()">ОК</button>
            </div>

            <div id="lobbyContainer">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">СПИСОК ЛОББИ:</div>
                <div id="roomList">Поиск игроков...</div>
            </div>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn btn-mini" style="background:#444;" onclick="location.reload()">⬅ МЕНЮ</button>
            <button id="startBtn" class="btn btn-mini" style="background:#34c759;" onclick="startGame()">СТАРТ</button>
        </div>

        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            
            <div id="msgOverlay" class="overlay" style="display: flex;">
                <h3 id="overlayText">ОЖИДАНИЕ ИГРОКА</h3>
                <p id="roomCodeDisplay" style="color: #34c759; font-weight: bold; font-size: 24px;"></p>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
