<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Air Hockey</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        #menu { padding-top: 50px; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 5px; background: #007bff; color: white; }
        .btn:active { background: #0056b3; }
        input { padding: 15px; font-size: 18px; width: 200px; text-align: center; text-transform: uppercase; border-radius: 5px; border: 1px solid #ccc; }
        canvas { background: #333; border: 3px solid #fff; display: none; margin: 10px auto; touch-action: none; }
        #status { color: #ffcc00; font-weight: bold; min-height: 20px; padding: 10px; }
        #displayId { font-size: 24px; color: #00ff00; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Аэрохоккей</h1>
        <div id="status">Нажмите кнопку ниже</div>
        <button class="btn" onclick="createRoom()">Создать комнату</button>
        <br><br>
        <input type="text" id="joinId" placeholder="КОД ИЗ 5 БУКВ">
        <br>
        <button class="btn" onclick="joinRoom()">Присоединиться</button>
    </div>

    <div id="gameUI" style="display:none;">
        <p id="idInfo">Код комнаты: <b id="displayId">...</b></p>
        <div id="hostControls" style="display:none;">
            <button class="btn" id="startGameBtn" onclick="sendStartSignal()">НАЧАТЬ ИГРУ</button>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
