<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Air Hockey FX Global</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; height: 100vh; height: -webkit-fill-available; }
        
        #menu { padding-top: calc(40px + var(--safe-top)); height: 100%; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); box-sizing: border-box; }
        
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; -webkit-appearance: none; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; }

        #topControls { position: absolute; top: calc(10px + var(--safe-top)); right: 10px; z-index: 1000; display: flex; gap: 8px; }
        #langSelect { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 5px; }

        #gameUI { display: none; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        #displayId { font-weight: 900; color: #34c759; }
        .id-large { font-size: 48px; margin: 10px 0; }
        .id-small { font-size: 14px; opacity: 0.5; }

        #gameArea { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; max-height: 70vh; max-width: 95vw; }
        .score-board { font-size: 38px; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        #skinSelectorContainer { margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 20px; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="topControls">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="menu">
        <h1>AIR HOCKEY FX</h1>
        <div id="status" data-i18n="loading">Загрузка...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()" data-i18n="create">СОЗДАТЬ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()" data-i18n="join">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        <div id="uiHeader">
            <span id="displayId" class="id-large">...</span>
            <div id="skinSelectorContainer" style="display:none;">
                <select id="skinSelect" onchange="changeSkin(this.value)">
                    <option value="0">Classic</option>
                    <option value="1">Neon Night</option>
                    <option value="2">Retro Wave</option>
                    <option value="3">Stadium (Grass)</option>
                    <option value="4">Deep Forest</option>
                    <option value="5">Anubis Tomb</option>
                    <option value="6">Hell Lava</option>
                    <option value="7">Deep Space</option>
                    <option value="8">Cyber City</option>
                </select>
            </div>
            <div id="hostControls" style="display:none; margin-top: 10px;">
                <button class="btn" onclick="sendStartSignal()" data-i18n="start">СТАРТ</button>
            </div>
        </div>
        <div id="gameArea">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
