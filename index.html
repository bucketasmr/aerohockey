<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey FX Visible Goals</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; }
        
        /* Переключатель языка */
        #langSwitcher { position: absolute; top: 10px; right: 10px; z-index: 1000; }
        #langSelect { padding: 5px 10px; font-size: 12px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid #444; cursor: pointer; }

        #displayId { font-weight: 900; color: #34c759; display: block; transition: all 0.5s ease; }
        .id-large { font-size: 48px; text-shadow: 0 0 20px rgba(52, 199, 89, 0.6); margin: 10px 0; letter-spacing: 5px; }
        .id-small { font-size: 14px; text-shadow: none; margin: 0; opacity: 0.5; letter-spacing: 1px; }
        
        #gameArea { position: relative; display: none; margin: 0 auto; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; }
        .score-board { font-size: 38px; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .btn-reset { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; z-index: 20; color: #fff; display: none; }
        #skinSelectorContainer { margin-bottom: 10px; display: none; background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="langSwitcher">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="menu">
        <h1>AIR HOCKEY FX</h1>
        <div id="status" data-i18n="loading">Загрузка...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()" data-i18n="create">СОЗДАТЬ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД" maxlength="5" data-i18n-placeholder="code">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()" data-i18n="join">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        <div id="uiHeader">
            <span id="displayId" class="id-large">...</span>
            <div id="skinSelectorContainer">
                <select id="skinSelect" onchange="changeSkin(this.value)">
                    <option value="0">Classic</option>
                    <option value="1">Neon Night</option>
                    <option value="2">Retro Wave</option>
                    <option value="3">Stadium (Grass)</option>
                    <option value="4">Deep Forest</option>
                    <option value="5">Anubis Tomb</option>
                    <option value="6">Hell Lava</option>
                    <option value="7">Deep Space</option>
                    <option value="8">Cyber City</option>
                </select>
            </div>
            <div id="hostControls" style="display:none; margin-top: 10px;">
                <button class="btn" onclick="sendStartSignal()" data-i18n="start">СТАРТ</button>
            </div>
        </div>
        <div id="gameArea">
            <button id="resetBtn" class="btn-reset" onclick="manualBallReset()">🆘 RESET</button>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
