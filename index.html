<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey P2P Ultimate</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        #menu { padding-top: 30px; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .btn { padding: 12px 30px; font-size: 18px; cursor: pointer; margin: 5px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; transition: 0.2s; outline: none; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-skin { background: #333; font-size: 14px; padding: 10px 15px; min-width: 40px; border: 1px solid #444; }
        .skin-active { background: #34c759; border-color: #fff; box-shadow: 0 0 10px rgba(52, 199, 89, 0.5); }
        input { padding: 12px; font-size: 18px; width: 200px; text-align: center; text-transform: uppercase; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; margin: 10px 0; outline: none; }
        #gameArea { position: relative; display: none; margin: 0 auto; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #333; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; touch-action: none; }
        #status { color: #ffcc00; padding: 10px; font-size: 16px; min-height: 20px; }
        #displayId { font-size: 24px; color: #34c759; font-weight: bold; }
        .score-board { font-size: 26px; font-weight: bold; color: #fff; margin: 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .skins-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px auto; max-width: 300px; }
        .btn-reset { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.1); z-index: 20; border-radius: 5px; }
        #inGameSkins { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; margin: 5px auto; display: inline-block; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Air Hockey</h1>
        <div id="status">Загрузка...</div>
        
        <div id="mainButtons" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ ИГРУ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД КОМНАТЫ">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
            
            <p style="margin-top:20px; color:#888;">Выберите стартовый дизайн:</p>
            <div class="skins-grid">
                <button class="btn btn-skin skin-active" onclick="setSkin(0, this)">1</button>
                <button class="btn btn-skin" onclick="setSkin(1, this)">2</button>
                <button class="btn btn-skin" onclick="setSkin(2, this)">3</button>
                <button class="btn btn-skin" onclick="setSkin(3, this)">4</button>
                <button class="btn btn-skin" onclick="setSkin(4, this)">5</button>
                <button class="btn btn-skin" onclick="setSkin(5, this)">6</button>
                <button class="btn btn-skin" onclick="setSkin(6, this)">7</button>
                <button class="btn btn-skin" onclick="setSkin(7, this)">8</button>
                <button class="btn btn-skin" onclick="setSkin(8, this)">9</button>
            </div>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="score-board" id="scoreDisplay">ВЫ 0 : 0 ВРАГ</div>
        
        <div id="inGameSkins" style="display:none;">
            <div class="skins-grid" style="margin:0;">
                <button class="btn btn-skin skin-active" onclick="setSkin(0, this)">1</button>
                <button class="btn btn-skin" onclick="setSkin(1, this)">2</button>
                <button class="btn btn-skin" onclick="setSkin(2, this)">3</button>
                <button class="btn btn-skin" onclick="setSkin(3, this)">4</button>
                <button class="btn btn-skin" onclick="setSkin(4, this)">5</button>
                <button class="btn btn-skin" onclick="setSkin(5, this)">6</button>
                <button class="btn btn-skin" onclick="setSkin(6, this)">7</button>
                <button class="btn btn-skin" onclick="setSkin(7, this)">8</button>
                <button class="btn btn-skin" onclick="setSkin(8, this)">9</button>
            </div>
        </div>

        <div id="idInfo" style="font-size: 14px; margin: 5px 0;">ID: <b id="displayId">...</b></div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn" onclick="sendStartSignal()" style="background:#34c759;">НАЧАТЬ МАТЧ</button>
        </div>
        
        <div id="gameArea">
            <button class="btn btn-reset" onclick="manualBallReset()" id="btnReset">🆘 СБРОС</button>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
