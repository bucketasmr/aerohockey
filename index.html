<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey FX Ultimate</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; width: 280px; transition: 0.3s; }
        
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; text-align: center; }
        
        #langSwitcher { position: absolute; top: 10px; right: 10px; z-index: 1000; }
        #langSelect { padding: 5px 10px; font-size: 12px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid #444; cursor: pointer; width: auto; }

        .id-display { color: #34c759; font-size: 24px; font-weight: 900; margin: 10px; letter-spacing: 2px; }
        
        #gameUI { display: none; flex-direction: column; align-items: center; }
        #gameArea { position: relative; width: 400px; height: 600px; margin: 0 auto; }
        canvas { background: #000; border: 4px solid #444; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; }
        .score-board { font-size: 38px; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 10px; }
        .btn-reset { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; z-index: 120; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="langSwitcher">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="menu">
        <h1>AIR HOCKEY FX</h1>
        <div id="status" data-i18n="loading">Загрузка...</div>
        
        <div id="setupActions" style="display:none;">
            <div id="myCodeArea">
                <span style="font-size: 12px; opacity: 0.6;" data-i18n="yourCode">ВАШ КОД:</span>
                <div id="myIdDisplay" class="id-display">-----</div>
            </div>

            <button class="btn" style="background: #444;" onclick="createRoom()" data-i18n="create">СОЗДАТЬ</button>
            
            <div style="margin-top:20px; display: flex; align-items: center; justify-content: center;">
                <input type="text" id="manualId" placeholder="КОД" maxlength="5" style="width: 100px;" data-i18n-placeholder="code">
                <button class="btn" style="background: #5856d6; width: auto; padding: 12px 25px; margin: 0 0 0 10px;" onclick="joinByCode()" data-i18n="join">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="gameUI">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        <div id="hostControls" style="display:none; margin-bottom: 10px;">
            <button class="btn" style="width:auto; padding: 10px 30px; background:#34c759;" onclick="startGame()" data-i18n="start">СТАРТ</button>
        </div>
        <div id="gameArea">
            <button class="btn-reset" onclick="resetBall()">🆘 RESET</button>
            <div id="msgOverlay" class="overlay">
                <h2 id="overlayText" data-i18n="waitingPlayer">ОЖИДАНИЕ ИГРОКА</h2>
                <div id="roomCodeDisplay" style="font-size: 40px; color: #34c759; font-weight: 900;"></div>
            </div>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
