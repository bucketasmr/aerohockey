<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey Ultimate FX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        #menu { padding-top: 50px; height: 100vh; display: flex; flex-direction: column; align-items: center; background: linear-gradient(135deg, #111 0%, #000 100%); }
        .btn { padding: 15px 45px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 50px; background: #007aff; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,122,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
        input, select { padding: 12px; font-size: 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: #fff; outline: none; margin: 5px; -webkit-appearance: none; }
        #gameArea { position: relative; display: none; margin: 0 auto; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #333; border-radius: 10px; display: block; max-height: 75vh; max-width: 95vw; margin: 0 auto; touch-action: none; }
        #status { color: #ffcc00; padding: 10px; font-size: 16px; min-height: 22px; }
        .score-board { font-size: 36px; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
        .btn-reset { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; z-index: 20; color: #fff; font-weight: bold; }
        #skinSelectorContainer { margin-bottom: 10px; display: none; background: rgba(255,255,255,0.1); padding: 5px 20px; border-radius: 20px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px #fff;">AIR HOCKEY FX</h1>
        <div id="status">Загрузка ресурсов...</div>
        <div id="setupActions" style="display:none;">
            <button class="btn" onclick="createRoom()">СОЗДАТЬ</button>
            <br>
            <input type="text" id="joinId" placeholder="КОД КОМНАТЫ" maxlength="5">
            <button class="btn" style="background: #5856d6;" onclick="joinRoom()">ВОЙТИ</button>
        </div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="score-board" id="scoreDisplay">0 : 0</div>
        
        <div id="skinSelectorContainer">
            <label for="skinSelect" style="font-size: 14px; color: #aaa;">Дизайн: </label>
            <select id="skinSelect" onchange="changeSkin(this.value)">
                <option value="0">Classic</option>
                <option value="1">Neon Night</option>
                <option value="2">Retro Wave</option>
                <option value="3">Stadium (Grass)</option>
                <option value="4">Deep Forest</option>
                <option value="5">Anubis Tomb</option>
                <option value="6">Hell Lava</option>
                <option value="7">Deep Space</option>
                <option value="8">Cyber City</option>
            </select>
        </div>

        <div id="idInfo" style="margin-bottom: 5px; font-size: 12px; opacity: 0.5;">ID: <span id="displayId">...</span></div>
        
        <div id="hostControls" style="display:none;">
            <button class="btn" onclick="sendStartSignal()">НАЧАТЬ МАТЧ</button>
        </div>
        
        <div id="gameArea">
            <button class="btn-reset" onclick="manualBallReset()">🆘 СБРОС</button>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
